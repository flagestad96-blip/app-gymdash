<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Gymdash — Redesign</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&family=Instrument+Serif&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg-0: #05070f;
    --bg-1: #0b0f1a;
    --ink-0: #f3f5ff;
    --ink-1: rgba(243,245,255,0.72);
    --ink-2: rgba(243,245,255,0.48);
    --ink-3: rgba(243,245,255,0.28);
    --accent-a: #60a5fa;   /* aurora blue */
    --accent-b: #c084fc;   /* aurora violet */
    --accent-c: #67e8f9;   /* cyan highlight */
    --accent-d: #f472b6;   /* soft pink aurora edge */
    --glass-stroke: rgba(255,255,255,0.14);
    --glass-stroke-strong: rgba(255,255,255,0.28);
    --glass-fill: rgba(255,255,255,0.06);
    --glass-fill-strong: rgba(255,255,255,0.10);
    --blur: 22px;
  }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg-0);
    color: var(--ink-0);
    font-family: 'Inter', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overflow: hidden;
  }
  * { box-sizing: border-box; }
  button { font-family: inherit; }

  /* Stage — full viewport, shows the phone centered on an ambient backdrop */
  .stage {
    position: fixed; inset: 0;
    display: grid; place-items: center;
    background: radial-gradient(1200px 800px at 20% 10%, #111428 0%, #06070d 55%, #030409 100%);
    overflow: hidden;
  }
  .stage::before {
    content: '';
    position: absolute; inset: -10%;
    background:
      radial-gradient(600px 400px at 15% 20%, rgba(96,165,250,0.14), transparent 60%),
      radial-gradient(500px 380px at 85% 30%, rgba(192,132,252,0.14), transparent 60%),
      radial-gradient(700px 500px at 70% 90%, rgba(103,232,249,0.10), transparent 60%);
    filter: blur(8px);
    pointer-events: none;
  }
  .stage::after {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px);
    background-size: 3px 3px;
    opacity: 0.4;
    mix-blend-mode: overlay;
    pointer-events: none;
  }

  .shell {
    position: relative;
    display: flex; gap: 48px; align-items: center;
  }

  /* Tweaks panel */
  .tweaks {
    position: fixed; right: 20px; bottom: 20px;
    width: 280px;
    padding: 16px;
    border-radius: 18px;
    background: rgba(15,17,28,0.72);
    backdrop-filter: blur(18px) saturate(140%);
    -webkit-backdrop-filter: blur(18px) saturate(140%);
    border: 1px solid var(--glass-stroke);
    color: var(--ink-0);
    font-size: 12px;
    z-index: 100;
    display: none;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .tweaks.on { display: block; }
  .tweaks h4 {
    margin: 0 0 12px; font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    color: var(--ink-2); font-weight: 600;
  }
  .tweak-row { margin-bottom: 12px; }
  .tweak-row label {
    display: block; font-size: 11px; color: var(--ink-2);
    margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .seg { display: flex; gap: 4px; background: rgba(255,255,255,0.04); padding: 3px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.06); }
  .seg button {
    flex: 1; background: transparent; color: var(--ink-1);
    border: 0; padding: 6px 8px; border-radius: 8px;
    font-size: 11px; font-weight: 500; cursor: pointer;
    transition: background 0.15s;
  }
  .seg button.on { background: rgba(255,255,255,0.12); color: var(--ink-0); }
  .slider { width: 100%; accent-color: var(--accent-b); }
  .chips { display: flex; gap: 6px; flex-wrap: wrap; }
  .chip {
    display: flex; align-items: center; gap: 6px;
    padding: 5px 9px; border-radius: 999px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 11px; cursor: pointer; color: var(--ink-1);
  }
  .chip.on { background: rgba(255,255,255,0.14); color: var(--ink-0); border-color: rgba(255,255,255,0.22); }
  .chip .dot { width: 10px; height: 10px; border-radius: 50%; }
</style>
</head>
<body>

{

// ===== components/Icons.jsx =====

const IconHome = (p) => <Icon {...p} d={<><path d="M3 11.5 12 4l9 7.5"/><path d="M5 10v9a1 1 0 0 0 1 1h4v-6h4v6h4a1 1 0 0 0 1-1v-9"/></>} />;

// ===== components/Aurora.jsx =====
// Aurora — animated color blobs behind the phone glass
function Aurora({ accent = 'aurora', animate = true }) {
  const palettes = {
    aurora: ['#60a5fa', '#c084fc', '#67e8f9', '#f472b6'],
    violet: ['#8b5cf6', '#ec4899', '#6366f1', '#a78bfa'],
    emerald: ['#34d399', '#22d3ee', '#a7f3d0', '#60a5fa'],
    sunset: ['#fb7185', '#f59e0b', '#ef4444', '#e879f9'],
  };
  const [a, b, c, d] = palettes[accent] || palettes.aurora;

  return (
    <div style={{
      position: 'absolute', inset: 0, overflow: 'hidden',
      borderRadius: 'inherit', zIndex: 0,
    }}>
      {/* base gradient */}
      <div style={{
        position: 'absolute', inset: 0,
        background: `linear-gradient(160deg, #0a0d1a 0%, #070814 60%, #040510 100%)`,
      }}/>
      {/* aurora blobs */}
      <div className="blob blob-a" style={{ background: `radial-gradient(closest-side, ${a}, transparent)` }}/>
      <div className="blob blob-b" style={{ background: `radial-gradient(closest-side, ${b}, transparent)` }}/>
      <div className="blob blob-c" style={{ background: `radial-gradient(closest-side, ${c}, transparent)` }}/>
      <div className="blob blob-d" style={{ background: `radial-gradient(closest-side, ${d}, transparent)` }}/>
      {/* fine grain */}
      <div style={{
        position: 'absolute', inset: 0,
        backgroundImage: 'radial-gradient(rgba(255,255,255,0.06) 1px, transparent 1px)',
        backgroundSize: '3px 3px',
        opacity: 0.25,
        mixBlendMode: 'overlay',
      }}/>
      {/* top vignette shimmer */}
      <div style={{
        position: 'absolute', inset: 0,
        background: 'linear-gradient(180deg, rgba(255,255,255,0.04), transparent 30%, transparent 70%, rgba(0,0,0,0.5))',
      }}/>

      <style>{`
        .blob { position: absolute; width: 520px; height: 520px; filter: blur(40px); opacity: 0.55; mix-blend-mode: screen; }
        .blob-a { top: -160px; left: -120px; ${animate ? 'animation: floatA 18s ease-in-out infinite;' : ''} }
        .blob-b { top: -80px; right: -180px; ${animate ? 'animation: floatB 22s ease-in-out infinite;' : ''} }
        .blob-c { bottom: -200px; left: -100px; ${animate ? 'animation: floatC 26s ease-in-out infinite;' : ''} }
        .blob-d { bottom: -140px; right: -120px; ${animate ? 'animation: floatD 20s ease-in-out infinite;' : ''} }
        @keyframes floatA { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(60px, 120px) scale(1.12); } }
        @keyframes floatB { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-80px, 80px) scale(1.08); } }
        @keyframes floatC { 0%,100% { transform: translate(0,0) scale(1.05); } 50% { transform: translate(100px, -80px) scale(0.95); } }
        @keyframes floatD { 0%,100% { transform: translate(0,0) scale(1); } 50% { transform: translate(-60px, -100px) scale(1.1); } }
      `}</style>
    </div>
  );
}

Object.assign(window, { Aurora });


// ===== components/Glass.jsx =====
// Glass — the workhorse glassmorphism card
function Glass({
  children, style, className = '', radius = 22, padding = 18,
  intensity = 65, strong = false, onClick,
  active = false,
}) {
  const blur = 8 + (intensity / 100) * 24;           // 8..32px
  const sat = 120 + (intensity / 100) * 60;          // 120..180%
  const fillA = 0.04 + (intensity / 100) * 0.10;     // 0.04..0.14
  const fillB = 0.02 + (intensity / 100) * 0.06;
  const strokeA = 0.12 + (intensity / 100) * 0.22;   // 0.12..0.34

  return (
    <div
      onClick={onClick}
      className={className}
      style={{
        position: 'relative',
        borderRadius: radius,
        padding,
        cursor: onClick ? 'pointer' : 'default',
        background: `linear-gradient(155deg, rgba(255,255,255,${fillA}) 0%, rgba(255,255,255,${fillB}) 100%)`,
        backdropFilter: `blur(${blur}px) saturate(${sat}%)`,
        WebkitBackdropFilter: `blur(${blur}px) saturate(${sat}%)`,
        border: `1px solid rgba(255,255,255,${strokeA})`,
        boxShadow: strong
          ? `inset 0 1px 0 rgba(255,255,255,0.35), inset 0 -1px 0 rgba(0,0,0,0.25), 0 18px 40px -12px rgba(0,0,0,0.55)`
          : `inset 0 1px 0 rgba(255,255,255,0.20), inset 0 -1px 0 rgba(0,0,0,0.18), 0 10px 26px -10px rgba(0,0,0,0.45)`,
        transition: 'transform 200ms cubic-bezier(.2,.8,.2,1), box-shadow 200ms',
        transform: active ? 'translateY(-1px)' : undefined,
        ...style,
      }}
    >
      {/* top-left specular highlight */}
      <div style={{
        position: 'absolute', inset: 0, borderRadius: 'inherit',
        background: 'radial-gradient(240px 120px at 20% 0%, rgba(255,255,255,0.18), transparent 60%)',
        pointerEvents: 'none', mixBlendMode: 'screen',
      }}/>
      <div style={{ position: 'relative', zIndex: 1 }}>{children}</div>
    </div>
  );
}

// Tiny frosted pill
function Pill({ children, tone = 'neutral', style }) {
  const tones = {
    neutral: { bg: 'rgba(255,255,255,0.08)', color: 'var(--ink-0)', stroke: 'rgba(255,255,255,0.14)' },
    accent:  { bg: 'rgba(96,165,250,0.16)', color: '#cfe0ff', stroke: 'rgba(96,165,250,0.35)' },
    violet:  { bg: 'rgba(192,132,252,0.16)', color: '#ecd7ff', stroke: 'rgba(192,132,252,0.35)' },
    cyan:    { bg: 'rgba(103,232,249,0.16)', color: '#d2fbff', stroke: 'rgba(103,232,249,0.35)' },
    pink:    { bg: 'rgba(244,114,182,0.16)', color: '#ffd9ec', stroke: 'rgba(244,114,182,0.35)' },
  };
  const t = tones[tone] || tones.neutral;
  return (
    <span style={{
      display: 'inline-flex', alignItems: 'center', gap: 6,
      padding: '4px 10px', borderRadius: 999,
      fontSize: 11, fontWeight: 500, letterSpacing: 0.02,
      background: t.bg, color: t.color, border: `1px solid ${t.stroke}`,
      backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)',
      ...style,
    }}>{children}</span>
  );
}

// Mono numeric readout
const Mono = ({ children, style }) => (
  <span style={{ fontFamily: "'JetBrains Mono', monospace", fontFeatureSettings: "'tnum'", ...style }}>{children}</span>
);

Object.assign(window, { Glass, Pill, Mono });

// Bottom gesture bar

  return (
    <div style={{ height: 22, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 }}>

Object.assign(window, { Phone, StatusBar, HomeBar });


// ===== components/Onboarding.jsx =====
// Onboarding — 3-step aurora welcome with goal selection and glass cards
function Onboarding({ intensity, onFinish }) {
  const [step, setStep] = React.useState(0);
  const [goals, setGoals] = React.useState(['strength']);
  const [days, setDays] = React.useState(4);

  const toggleGoal = (g) => setGoals(gs => gs.includes(g) ? gs.filter(x=>x!==g) : [...gs, g]);

  const goalList = [

// SVG progress ring used in onboarding preview
function Ring({ progress = 0.7, size = 48, stroke = 5, color = 'url(#rg)' }) {
  const r = (size - stroke) / 2;
  const C = 2 * Math.PI * r;
  return (
    <svg width={size} height={size} style={{ transform: 'rotate(-90deg)' }}>
      <defs>
        <linearGradient id="rg" x1="0" x2="1" y1="0" y2="1">
          <stop offset="0%" stopColor="#60a5fa"/>
          <stop offset="100%" stopColor="#c084fc"/>
        </linearGradient>
      </defs>
      <circle cx={size/2} cy={size/2} r={r} stroke="rgba(255,255,255,0.1)" strokeWidth={stroke} fill="none"/>
      <circle cx={size/2} cy={size/2} r={r} stroke={color} strokeWidth={stroke} fill="none"
        strokeLinecap="round"
        strokeDasharray={C} strokeDashoffset={C * (1 - progress)}/>
    </svg>
  );
}

    { name: 'Cable Fly', target: '3 × 12', sets: [
      { reps: null, weight: 18, done: false },
      { reps: null, weight: 18, done: false },
      { reps: null, weight: 18, done: false },
    ]},
  ]);

  // tick clocks
  React.useEffect(() => {
    if (paused) return;
    const id = setInterval(() => {
      setElapsed(e => e + 1);
      if (resting) {
        setRestLeft(r => {
          if (r <= 1) { setResting(false); return 90; }
          return r - 1;
        });
      }
    }, 1000);
    return () => clearInterval(id);
  }, [paused, resting]);

  const fmt = (s) => {
    const m = Math.floor(s / 60), sec = s % 60;
    return `${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}`;
  };

  const currentEx = exercises[exIndex];
  const totalSetsDone = exercises.reduce((acc, e) => acc + e.sets.filter(s=>s.done).length, 0);
  const totalSets = exercises.reduce((acc, e) => acc + e.sets.length, 0);
  const progress = totalSetsDone / totalSets;

  const logSet = () => {
    setExercises(exs => exs.map((e, i) => {
      if (i !== exIndex) return e;
      return { ...e, sets: e.sets.map((s, j) => j === setIndex ? { reps, weight, done: true } : s) };
    }));
    // advance
    if (setIndex < currentEx.sets.length - 1) {
      setSetIndex(si => si + 1);
    } else if (exIndex < exercises.length - 1) {
      setExIndex(ei => ei + 1);
      setSetIndex(0);
    }
    setResting(true);
    setRestLeft(90);
  };

  // Rest progress
  const restPct = (90 - restLeft) / 90;

  return (
    <div style={{ flex: 1, display: 'flex', flexDirection: 'column', overflow: 'hidden', padding: '6px 18px 24px' }}>

      {/* Top bar */}
      <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 12 }}>

          background: 'rgba(255,255,255,0.06)',
          border: '1px solid rgba(255,255,255,0.12)',
          color: '#fff', display: 'grid', placeItems: 'center', cursor: 'pointer',

        }}><IconBack size={18}/></button>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 10, color: 'var(--ink-2)', letterSpacing: 0.16, textTransform: 'uppercase' }}>
            Upper body power
          </div>
          <Mono style={{ fontSize: 14, fontWeight: 500, letterSpacing: 0.04 }}>{fmt(elapsed)}</Mono>
        </div>
        <button style={{
          width: 40, height: 40, borderRadius: 12,
          background: 'rgba(255,255,255,0.06)',
          border: '1px solid rgba(255,255,255,0.12)',
          color: '#fff', display: 'grid', placeItems: 'center', cursor: 'pointer',
        }}><IconMore size={18}/></button>
      </div>

      {/* Hero rest-or-active card */}
      <Glass intensity={intensity} radius={28} padding={20} strong>
        {resting ? (
          <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'center', padding: '8px 0 4px' }}>
            <div style={{ position: 'relative', width: 180, height: 180 }}>
              <Ring progress={restPct} size={180} stroke={6}/>
              <div style={{
                position: 'absolute', inset: 0, display: 'flex', flexDirection: 'column',
                alignItems: 'center', justifyContent: 'center',
              }}>
                <div style={{ fontSize: 10, color: 'var(--ink-2)', letterSpacing: 0.2, textTransform: 'uppercase' }}>Rest</div>
                <Mono style={{
                  fontSize: 54, fontWeight: 600, lineHeight: 1,
                  background: 'linear-gradient(180deg,#fff,#67e8f9)',
                  WebkitBackgroundClip: 'text', WebkitTextFillColor: 'transparent',
                }}>{fmt(restLeft)}</Mono>
                <div style={{ fontSize: 11, color: 'var(--ink-2)', marginTop: 4 }}>breathe · sip · reset</div>
              </div>
            </div>
            <div style={{ display: 'flex', gap: 8, marginTop: 18 }}>
              <button onClick={() => setRestLeft(r => r + 15)} style={restBtnStyle}>+15s</button>
              <button onClick={() => { setResting(false); setRestLeft(90); }} style={{
                ...restBtnStyle,
                background: 'linear-gradient(135deg,#60a5fa,#c084fc)',
                border: 'none',
              }}>Skip rest</button>
            </div>
          </div>
        ) : (
          <>
            <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start' }}>
              <div>
                <Pill tone="accent">
                  <IconTarget size={11}/> Exercise {exIndex + 1} of {exercises.length}
                </Pill>
                <div style={{ fontSize: 22, fontWeight: 500, marginTop: 10, fontFamily: "'Instrument Serif', serif", lineHeight: 1.1 }}>
                  {currentEx.name}
                </div>
                <div style={{ fontSize: 12, color: 'var(--ink-2)', marginTop: 4 }}>
                  Target: {currentEx.target}
                </div>
              </div>
              <Ring progress={progress} size={52} stroke={4}/>
            </div>

            {/* Set row */}
            <div style={{ marginTop: 18, display: 'flex', gap: 6 }}>
              {currentEx.sets.map((s, i) => (
                <div key={i} style={{
                  flex: 1, height: 30, borderRadius: 10,
                  display: 'grid', placeItems: 'center',
                  fontSize: 11, fontFamily: "'JetBrains Mono', monospace",
                  fontWeight: 500,
                  background: s.done
                    ? 'linear-gradient(135deg, rgba(96,165,250,0.35), rgba(192,132,252,0.35))'
                    : i === setIndex
                      ? 'rgba(255,255,255,0.10)'
                      : 'rgba(255,255,255,0.04)',
                  border: i === setIndex && !s.done
                    ? '1px solid rgba(192,132,252,0.55)'
                    : '1px solid rgba(255,255,255,0.08)',
                  color: s.done ? '#fff' : 'var(--ink-1)',
                }}>{s.done ? `${s.reps}×${s.weight}` : `Set ${i+1}`}</div>
              ))}
            </div>

            {/* Rep & weight adjusters */}
            <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 16 }}>
              <Adjuster label="Reps" value={reps} onAdj={(d) => setReps(r => Math.max(0, r + d))} unit=""/>
              <Adjuster label="Weight" value={weight} onAdj={(d) => setWeight(w => Math.max(0, +(w + d * 2.5).toFixed(2)))} unit="kg"/>
            </div>

            <button onClick={logSet} style={{
              marginTop: 16, width: '100%', height: 52, borderRadius: 16, border: 'none',

      {/* Up next */}

        </div>
      </Glass>
    </div>
  );
}

// Tweaks panel — toggles live in-design
function Tweaks({ defaults, values, onChange }) {
  const [on, setOn] = React.useState(false);

  React.useEffect(() => {
    const handler = (e) => {
      if (!e.data || typeof e.data !== 'object') return;
      if (e.data.type === '__activate_edit_mode') setOn(true);
      if (e.data.type === '__deactivate_edit_mode') setOn(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const update = (patch) => {
    const next = { ...values, ...patch };
    onChange(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  if (!on) return null;

  return (
    <div className="tweaks on">
      <h4>Tweaks</h4>

      <div className="tweak-row">
        <label>Screen</label>
        <div className="chips">
          {['onboarding','home','stats','library','exercise','workout','summary','log','profile','nutrition'].map(s => (
            <div key={s} className={'chip ' + (values.screen === s ? 'on' : '')} onClick={() => update({ screen: s })}>
              {s}
            </div>
          ))}
        </div>
      </div>

      <div className="tweak-row">
        <label>Glass intensity · {values.glassIntensity}</label>
        <input type="range" min="0" max="100" step="5" className="slider"
          value={values.glassIntensity}
          onChange={(e) => update({ glassIntensity: +e.target.value })}/>
      </div>

      <div className="tweak-row">
        <label>Aurora palette</label>
        <div className="chips">
          {[
            { id:'aurora', c:'linear-gradient(135deg,#60a5fa,#c084fc)' },
            { id:'violet', c:'linear-gradient(135deg,#8b5cf6,#ec4899)' },
            { id:'emerald', c:'linear-gradient(135deg,#34d399,#22d3ee)' },
            { id:'sunset', c:'linear-gradient(135deg,#fb7185,#f59e0b)' },
          ].map(p => (
            <div key={p.id} className={'chip ' + (values.accent === p.id ? 'on' : '')} onClick={() => update({ accent: p.id })}>
              <span className="dot" style={{ background: p.c }}/> {p.id}
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

    push:'linear-gradient(135deg,#60a5fa,#c084fc)',

    { id:'log', icon:<IconCalendar size={22}/>, label:'Log' },
    { id:'profile', icon:<IconUser size={22}/>, label:'You' },
  ];
  return (
    <div style={{ position:'absolute', bottom:24, left:16, right:16, zIndex:5 }}>
      <Glass intensity={Math.max(intensity, 70)} radius={26} padding={8} strong>
        <div style={{ display:'flex', justifyContent:'space-between', alignItems:'center' }}>
          {tabs.map(t => {
            if (t.fab) return (
              <button key={t.id} onClick={() => onNav('workout')} style={{
                width:50, height:50, borderRadius:16, border:'none', cursor:'pointer',
                background:'linear-gradient(135deg, #60a5fa, #c084fc 60%, #f472b6)',
                color:'#fff', display:'grid', placeItems:'center',
                boxShadow:'0 8px 24px -6px rgba(192,132,252,0.6), inset 0 1px 0 rgba(255,255,255,0.3)',
                transform:'translateY(-8px)',
              }}>{t.icon}</button>
            );
            const on = active === t.id;
            return (
              <button key={t.id} onClick={() => onNav(t.id)} style={{
                flex:1, height:50, background:'transparent', border:'none', cursor:'pointer',
                display:'flex', flexDirection:'column', gap:2, alignItems:'center', justifyContent:'center',
                color: on ? '#fff' : 'rgba(255,255,255,0.5)',
              }}>
                {t.icon}
                <span style={{ fontSize:9, fontWeight:500, letterSpacing:0.02 }}>{t.label}</span>
              </button>
            );
          })}
        </div>
      </Glass>
    </div>
  );
}

Object.assign(window, { Stats, Library, ExerciseDetail, Summary, Profile, LogScreen, Nutrition, ScreenHeader, BottomNav });


// ===== app.jsx =====
// App entry — picks the screen, wraps it in the phone, mounts Tweaks
function App() {
  const defaults = JSON.parse(document.getElementById('tweaks-defaults').textContent);
  const [values, setValues] = React.useState(defaults);
  const [exercise, setExercise] = React.useState(null);

  const goto = (screen) => setValues(v => ({ ...v, screen }));

  const mainScreens = ['home','stats','log','profile'];
  const active = mainScreens.includes(values.screen) ? values.screen : 'home';

  let screen, showNav = true;
  switch (values.screen) {
    case 'onboarding':
      screen = <Onboarding intensity={values.glassIntensity} onFinish={() => goto('home')}/>;
      showNav = false; break;
    case 'workout':
      screen = <Workout intensity={values.glassIntensity} onExit={() => goto('summary')}/>;
      showNav = false; break;
    case 'summary':
      screen = <Summary intensity={values.glassIntensity} onDone={() => goto('home')}/>;
      showNav = false; break;
    case 'stats':
      screen = <Stats intensity={values.glassIntensity}/>; break;
    case 'library':
      screen = <Library intensity={values.glassIntensity} onOpenExercise={(e) => { setExercise(e); goto('exercise'); }}/>;
      showNav = false; break;
    case 'exercise':
      screen = <ExerciseDetail intensity={values.glassIntensity} exercise={exercise} onBack={() => goto('library')}/>;
      showNav = false; break;
    case 'profile':
      screen = <Profile intensity={values.glassIntensity} onOpen={(g) => goto(g)}/>;
      break;
    case 'log':
      screen = <LogScreen intensity={values.glassIntensity}/>; break;
    case 'nutrition':
      screen = <Nutrition intensity={values.glassIntensity} onBack={() => goto('profile')}/>;
      showNav = false; break;
    case 'home':
    default:
      screen = <Home intensity={values.glassIntensity} onStartWorkout={() => goto('workout')} onNav={goto}/>;
      showNav = false; // Home has its own embedded nav
      break;
  }

  return (
    <div className="stage">
      <div className="shell" data-screen-label={`Gymdash · ${values.screen}`}>
        <Phone bgAccent={values.accent}>
          <StatusBar/>
          {screen}
          {showNav && <BottomNav intensity={values.glassIntensity} active={active} onNav={goto}/>}
          <HomeBar/>
        </Phone>
      </div>
      <Tweaks defaults={defaults} values={values} onChange={setValues}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);


</script>
